<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Way SPN Admin</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/admin/assets/admin.css?v=20260610-2">
</head>
<body>
  <div class="shell">
    <header class="top">
      <div>
        <p class="eyebrow">Way SPN</p>
        <h1>Админ-панель</h1>
        <p id="adminLine" class="muted">Загрузка...</p>
      </div>
      <button class="button ghost" onclick="reloadAll()">Обновить</button>
    </header>

    <nav class="tabs">
      <button class="tab active" data-view="dashboard">Обзор</button>
      <button class="tab" data-view="users">Пользователи</button>
      <button class="tab" data-view="promos">Промо</button>
      <button class="tab" data-view="links">Ссылки</button>
      <button class="tab" data-view="notifications">Уведомления</button>
      <button class="tab" data-view="discounts">Скидки</button>
    </nav>

    <main>
      <section id="view-dashboard" class="view active"></section>
      <section id="view-users" class="view"></section>
      <section id="view-promos" class="view"></section>
      <section id="view-links" class="view"></section>
      <section id="view-notifications" class="view"></section>
      <section id="view-discounts" class="view"></section>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script src="/admin/assets/admin.js?v=20260610-2"></script>
</body>
</html>
